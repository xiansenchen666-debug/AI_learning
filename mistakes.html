<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星途启航 AI 自习室</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <div class="ambient">
      <div class="blob one"></div>
      <div class="blob two"></div>
      <div class="blob three"></div>
    </div>

    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">星</div>
          <div>
            <p class="brand-title">星途启航</p>
            <p class="brand-subtitle">AI 自习室</p>
          </div>
        </div>

        
        <nav class="nav">
          <a href="/dashboard" class="nav-btn "><span class="icon-badge">学</span><span class="nav-label">学习中心</span></a>
          <a href="/subjects" class="nav-btn "><span class="icon-badge">课</span><span class="nav-label">同步课程</span></a>
          <a href="/mistakes" class="nav-btn active"><span class="icon-badge">错</span><span class="nav-label">智能错题本</span></a>
          <a href="/growth" class="nav-btn "><span class="icon-badge">轨</span><span class="nav-label">成长轨迹</span></a>
        </nav>


        <div class="sidebar-footer">
          <button class="nav-btn"><span class="icon-badge">设</span><span class="nav-label">系统设置</span></button>
        </div>
      </aside>

      <main class="content">
        <header class="topbar" style="justify-content: flex-end;">
          <div class="topbar-right">
            <div class="avatar-card">
              <div>
                <p style="font-size:14px;font-weight:800;">Cary</p>
                <p class="muted" style="font-size:12px;margin-top:4px;">Lv.12 学霸</p>
              </div>
              <div class="avatar">CA</div>
            </div>
          </div>
        </header>

        <div class="page-scroll">
          <section class="page active" id="mistakes-page">

            <div class="growth-header">
              <div>
                <h1 class="section-title" style="font-size:34px;">智能错题本</h1>
                <p class="muted" style="margin-top:8px;">攻克错题，举一反三</p>
              </div>
            </div>
            <div class="grid" style="gap:24px;">
              <div class="card">
                <div class="mistake-box">
                  <div class="row-between"><span class="mini-chip" style="background:rgba(238,242,255,.9);">数学</span><span class="muted" style="font-size:12px;">昨天的周测</span></div>
                  <p style="margin:14px 0 18px;line-height:1.7;font-weight:700;">已知二次函数 y=ax^2+bx+c 的图象经过点(1,0)，求对称轴并分析开口方向。</p>
                  <button class="secondary-btn" style="width:100%;">AI 举一反三</button>
                </div>
              </div>
            </div>

          </section>
        </div>
      </main>
    </div>

    
    </div>

    
  </body>
</html>
