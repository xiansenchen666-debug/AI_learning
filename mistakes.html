<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星途启航 AI 自习室</title>
    <link rel="stylesheet" href="assets/app.css?v=20260713-01" />
</head>
  <body class="profile-ready" data-page="mistakes">
    <div class="ambient">
      <div class="blob one"></div>
      <div class="blob two"></div>
      <div class="blob three"></div>
    </div>

    <div class="app-shell">
                  <aside class="sidebar">
        <div class="brand">
          <div>
            <div class="brand-stack">
            <div class="brand-lockup">
  <span class="brand-kicker">星途</span>
  <span class="brand-title">启航教育</span>
</div>
          </div>
            
          </div>
        </div>

        <nav class="nav">
          <a href="/dashboard" class="nav-btn"><span class="icon-badge">学</span><span class="nav-label">学习中心</span></a>
          <a href="/subjects" class="nav-btn"><span class="icon-badge">课</span><span class="nav-label">全部课程</span></a>
          <a href="/mistakes" class="nav-btn active"><span class="icon-badge">错</span><span class="nav-label">智能错题本</span></a>
          <a href="/growth" class="nav-btn"><span class="icon-badge">轨</span><span class="nav-label">成长轨迹</span></a>
          <a href="/question-bank" class="nav-btn question-bank-nav"><span class="icon-badge">题</span><span class="nav-label">题库练习</span></a>
        </nav>

        <div class="sidebar-footer">
          <div class="avatar-card avatar-trigger-card" id="avatar-trigger">
            <div>
              <p class="sidebar-user-name" data-user-name></p>
              <p class="muted sidebar-user-level" data-user-level></p>
            </div>
            <div class="avatar" data-avatar-text></div>
            <div class="avatar-dropdown" id="avatar-dropdown">
              <div class="dropdown-header">
                <div class="avatar avatar-sm" data-avatar-text></div>
                <div>
                  <p class="dropdown-user-name" data-user-name></p>
                  <p class="dropdown-user-email" data-user-email></p>
                </div>
              </div>
              <div class="dropdown-divider"></div>
              <a href="/login" data-action="logout" class="dropdown-item dropdown-logout">
                <span class="dropdown-logout-icon">🚪</span> 退出登录
              </a>
            </div>
          </div>
        </div>
      </aside>

      <main class="content">
<div class="page-scroll">
          <section class="page active" id="mistakes-page">
            <div class="growth-header"><div><h1 class="section-title page-title-lg">智能错题本</h1><p class="muted page-header-subtitle"></p></div></div>
            <div id="mistakes-root" class="grid gap-24"></div>
          </section>
        </div>
      </main>
    </div>

    
    <script>
      // Dropdown toggle logic
      const avatarTrigger = document.getElementById('avatar-trigger');
      const avatarDropdown = document.getElementById('avatar-dropdown');
      
      if (avatarTrigger && avatarDropdown) {
        avatarTrigger.addEventListener('click', function(e) {
          e.stopPropagation();
          avatarDropdown.classList.toggle('active');
        });
        
        document.addEventListener('click', function(e) {
          if (!avatarTrigger.contains(e.target)) {
            avatarDropdown.classList.remove('active');
          }
        });
      }
    </script>
    <script src="assets/app.js?v=20260713-01"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        initMistakesPage().catch((error) => console.warn(error));
      });
    </script>
  </body>
</html>
