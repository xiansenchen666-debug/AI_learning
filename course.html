<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Minds - 互动课舱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body {
            font-family: 'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #000000;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }
        .apple-tight { letter-spacing: -0.02em; }
        .nav-frosted {
            background: rgba(29, 29, 31, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
        }
        .product-shadow {
            box-shadow: rgba(0, 0, 0, 0.22) 3px 5px 30px 0;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Global Nav (Minimal) -->
    <nav class="h-[44px] bg-[#000000] flex items-center px-6 shrink-0">
        <div class="text-[12px] font-semibold tracking-wide text-white">ELITE MINDS</div>
    </nav>

    <!-- Sub Nav Frosted (Store style) -->
    <nav class="h-[52px] nav-frosted border-b border-white/10 sticky top-0 z-50 flex items-center justify-between px-6">
        <div class="text-[21px] font-semibold apple-tight" id="nav-title">正在加载...</div>
        <button onclick="window.location.href='/dashboard'" class="text-[14px] bg-[#0066cc] text-white px-[15px] py-[8px] rounded-[9999px] hover:scale-95 transition-transform active:scale-95">返回图谱</button>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-1 w-full max-w-[1440px] mx-auto px-6 py-[48px] lg:py-[80px]">
        
        <div class="flex flex-col lg:flex-row gap-[48px]">
            <!-- Left: Video & Teacher (The "Product") -->
            <div class="flex-1 space-y-[48px]">
                
                <!-- Video Player Placeholder -->
                <div class="w-full aspect-video rounded-[18px] bg-[#252527] relative overflow-hidden flex items-center justify-center group cursor-pointer product-shadow">
                    <!-- Subtle imagery -->
                    <div class="absolute inset-0 bg-gradient-to-tr from-blue-900/30 to-transparent"></div>
                    <!-- Play button icon -->
                    <div class="w-16 h-16 rounded-full bg-[rgba(210,210,215,0.64)] backdrop-blur-md flex items-center justify-center z-10 group-hover:scale-105 transition-transform">
                        <svg class="w-8 h-8 text-[#1d1d1f] ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                    <!-- Bottom overlay info -->
                    <div class="absolute bottom-6 left-6 z-10">
                        <div class="text-[12px] text-gray-300 tracking-wider uppercase mb-1">4K HDR</div>
                        <h2 class="text-[34px] font-semibold apple-tight" id="video-title">加载中...</h2>
                    </div>
                </div>

                <!-- Teacher & Bilingual Notes -->
                <div class="bg-[#272729] rounded-[18px] p-[40px]">
                    <div class="flex items-center space-x-6 mb-[32px]">
                        <div class="w-[80px] h-[80px] rounded-full bg-[#1d1d1f] overflow-hidden shrink-0 flex items-center justify-center">
                            <span class="text-4xl" id="teacher-avatar">👨‍🏫</span>
                        </div>
                        <div>
                            <div class="text-[12px] text-[#cccccc] mb-1">主讲名师 / MASTER TEACHER</div>
                            <h3 class="text-[28px] font-semibold apple-tight mb-1" id="teacher-name">...</h3>
                            <p class="text-[14px] text-[#cccccc]" id="teacher-title">...</p>
                        </div>
                    </div>
                    <div class="border-t border-white/10 pt-[32px]">
                        <h4 class="text-[17px] font-semibold mb-4 text-white">Bilingual Notes / 双语讲义</h4>
                        <p class="text-[17px] text-[#cccccc] leading-[1.47]" id="course-notes">...</p>
                    </div>
                </div>
            </div>

            <!-- Right: Knowledge Chain & Exercises -->
            <div class="w-full lg:w-[400px] space-y-[24px]">
                
                <!-- Dependency Chain -->
                <div class="bg-[#272729] rounded-[18px] p-[32px]">
                    <h4 class="text-[17px] font-semibold mb-[24px]">图谱链条 (Dependencies)</h4>
                    <div class="space-y-[16px] relative text-[14px]" id="dependency-chain">
                        <!-- Rendered by JS -->
                    </div>
                </div>

                <!-- Exercises -->
                <div class="bg-[#272729] rounded-[18px] p-[32px]">
                    <h4 class="text-[17px] font-semibold mb-[24px]">配套练习 (Exercises)</h4>
                    <div class="space-y-[12px]" id="exercise-list">
                        <!-- Rendered by JS -->
                    </div>
                </div>
                
                <!-- Ask AI Button -->
                <button onclick="window.location.href='/ai'" class="w-full bg-[#2a2a2c] text-[#2997ff] border border-white/10 rounded-[18px] py-[16px] text-[17px] font-medium transition-transform hover:bg-[#333333] active:scale-95">
                    遇到困难？进入 AI 答疑舱
                </button>
            </div>
        </div>
    </main>

    <script>
        const courseDB = {
            "hm1": {
                title: "函数的概念",
                avatar: "👨‍🏫",
                teacher: "李教授",
                teacherTitle: "清华大学数学系博士导师",
                notes: "Functions represent a deterministic mapping between two sets. Every input corresponds to exactly one output. <br><br>函数是两个集合之间确定的映射关系。理解函数的本质，是开启现代代数与微积分大门的钥匙。",
                prev: "集合论基础", next: "反函数与复合函数",
                exercises: ["练习：求下列函数的定义域", "测验：函数的基本性质"]
            },
            "hm2": {
                title: "导数的应用",
                avatar: "👩‍🏫",
                teacher: "张教授",
                teacherTitle: "北京大学数学科学学院教授",
                notes: "Derivatives measure the rate of change. They are essential in finding local extrema and analyzing function monotonicity. <br><br>导数衡量了变化率。在寻找局部极值和分析函数单调性时，导数是不可或缺的工具。",
                prev: "极限与连续", next: "积分基础",
                exercises: ["练习：利用导数求单调区间", "综合应用：最大利润问题"]
            },
            "hp1": {
                title: "万有引力",
                avatar: "👨‍🔬",
                teacher: "王研究员",
                teacherTitle: "中国科学院物理研究所",
                notes: "Gravity is a universal attractive force between all matter. Newton's formulation unified celestial and terrestrial mechanics. <br><br>万有引力是所有物质之间普遍存在的吸引力。牛顿的公式统一了天体力学与地面力学。",
                prev: "圆周运动", next: "宇宙速度",
                exercises: ["计算：地球表面的重力加速度", "应用：卫星轨道周期推导"]
            }
        };

        const params = new URLSearchParams(window.location.search);
        const courseId = params.get('id') || 'hm1';
        
        const data = courseDB[courseId] || {
            title: "未知知识点", avatar: "🤖", teacher: "AI 导师", teacherTitle: "智能辅助教学",
            notes: "Please select a valid node from the Dashboard. <br><br>请从概览页面选择有效的知识点节点进入。",
            prev: "无", next: "无", exercises: ["暂无练习"]
        };

        document.getElementById('nav-title').textContent = data.title;
        document.getElementById('video-title').textContent = data.title;
        document.getElementById('teacher-name').textContent = data.teacher;
        document.getElementById('teacher-title').textContent = data.teacherTitle;
        document.getElementById('teacher-avatar').textContent = data.avatar;
        document.getElementById('course-notes').innerHTML = data.notes;

        document.getElementById('dependency-chain').innerHTML = `
            <div class="flex items-center text-[#cccccc]">
                <div class="w-2 h-2 rounded-full bg-gray-500 mr-4 shrink-0"></div> 
                <span class="truncate">${data.prev} (前置)</span>
            </div>
            <div class="w-px h-[24px] bg-white/10 ml-[3px] my-1"></div>
            <div class="flex items-center text-[#2997ff] font-semibold text-[17px]">
                <div class="w-2 h-2 rounded-full bg-[#0066cc] shadow-[0_0_8px_#0066cc] mr-4 shrink-0"></div> 
                <span class="truncate">${data.title} (当前)</span>
            </div>
            <div class="w-px h-[24px] bg-white/10 ml-[3px] my-1"></div>
            <div class="flex items-center text-[#cccccc]">
                <div class="w-2 h-2 rounded-full border border-gray-500 mr-4 shrink-0"></div> 
                <span class="truncate">${data.next} (后置)</span>
            </div>
        `;

        document.getElementById('exercise-list').innerHTML = data.exercises.map(ex => `
            <div class="px-[20px] py-[16px] rounded-[11px] bg-[#fafafc] text-[#1d1d1f] hover:shadow-[0_0_0_2px_#0071e3] cursor-pointer transition-shadow flex justify-between items-center group">
                <span class="text-[14px] font-medium">${ex}</span>
                <span class="text-[#0066cc] text-[18px] group-hover:translate-x-1 transition-transform">›</span>
            </div>
        `).join('');
    </script>
</body>
</html>
