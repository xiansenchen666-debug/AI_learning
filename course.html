<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星途启航 AI 自习室</title>
    <link rel="stylesheet" href="assets/app.css?v=20260629-6" />
  </head>
  <body class="profile-ready" data-page="course">
    <div class="ambient">
      <div class="blob one"></div>
      <div class="blob two"></div>
      <div class="blob three"></div>
    </div>

    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div>
            <div class="brand-stack">
              <div class="brand-lockup">
                <span class="brand-kicker">星途</span>
                <span class="brand-title">启航教育</span>
              </div>
            </div>
          </div>
        </div>

        <nav class="nav">
          <a href="dashboard.html" class="nav-btn"><span class="icon-badge">学</span><span class="nav-label">学习中心</span></a>
          <a href="subjects.html" class="nav-btn active"><span class="icon-badge">课</span><span class="nav-label">全部课程</span></a>
          <a href="mistakes.html" class="nav-btn"><span class="icon-badge">错</span><span class="nav-label">智能错题本</span></a>
          <a href="growth.html" class="nav-btn"><span class="icon-badge">轨</span><span class="nav-label">成长轨迹</span></a>
        </nav>

        <div class="sidebar-footer">
          <div class="avatar-card avatar-trigger-card" id="avatar-trigger">
            <div>
              <p class="sidebar-user-name" data-user-name></p>
              <p class="muted sidebar-user-level" data-user-level></p>
            </div>
            <div class="avatar" data-avatar-text></div>
            <div class="avatar-dropdown" id="avatar-dropdown">
              <div class="dropdown-header">
                <div class="avatar avatar-sm" data-avatar-text></div>
                <div>
                  <p class="dropdown-user-name" data-user-name></p>
                  <p class="dropdown-user-email" data-user-email></p>
                </div>
              </div>
              <div class="dropdown-divider"></div>
              <a href="login.html" data-action="logout" class="dropdown-item dropdown-logout">
                <span class="dropdown-logout-icon">🚪</span> 退出登录
              </a>
            </div>
          </div>
        </div>
      </aside>

      <main class="content course-content-shell">
        <section class="course-workspace page active" id="course-page">
          <header class="workspace-mini-header">
            <div class="workspace-title-zone">
              <a href="subjects.html" class="nav-back-link workspace-back-link" id="course-back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                <span>返回年级</span>
              </a>
              <div class="workspace-title-copy">
                <h1 id="course-title-main"></h1>
                <p id="course-title-subtitle"></p>
              </div>
            </div>
            <div id="course-summary" class="workspace-badges"></div>
          </header>

          <div id="course-root" class="learning-desk-sandbox is-hidden">
            <aside class="learning-pane chapter-tree-panel">
              <div class="pane-head">
                <div>
                  <p>CHAPTER TREE</p>
                  <h2>课程目录</h2>
                </div>
                <strong data-course-lesson-count></strong>
              </div>
              <div class="chapter-tree" data-lesson-tree></div>
            </aside>

            <section class="learning-pane lecture-pane">
              <article class="lecture-document">
                <div class="lecture-document-head">
                  <div>
                    <p class="lecture-kicker" data-lesson-kicker></p>
                    <h2 data-lesson-title></h2>
                  </div>
                  <div class="lesson-header-actions">
                    <span class="knowledge-node-status is-pending" data-lesson-status></span>
                    <a class="lesson-practice-link" href="question-bank.html" data-question-bank-link>
                      <span data-bank-question-count></span>
                      <b>练习</b>
                    </a>
                  </div>
                </div>
                <div class="lecture-progress-row">
                  <span data-lesson-score></span>
                  <div class="knowledge-node-track"><div class="knowledge-node-fill" data-lesson-progress-fill></div></div>
                </div>
                <div class="lecture-content" data-lecture-content></div>
              </article>
            </section>

            <aside class="learning-pane study-coach-panel">
              <div class="pane-head coach-pane-head">
                <div>
                  <p>AI STUDY COACH</p>
                  <h2>学习助手</h2>
                </div>
                <strong data-coach-task-label>本节任务</strong>
              </div>

              <div class="coach-stack">
                <section class="coach-card coach-card-primary">
                  <div class="coach-card-head">
                    <span data-coach-status></span>
                    <strong>本节建议</strong>
                  </div>
                  <p data-coach-summary></p>
                  <ul class="coach-advice-list" data-coach-advice></ul>
                </section>

                <section class="coach-card">
                  <div class="coach-card-head">
                    <span>PLAN</span>
                    <strong>学习顺序</strong>
                  </div>
                  <ol class="lesson-plan-list" data-lesson-plan></ol>
                </section>

                <section class="coach-card coach-grade-lock-card">
                  <div class="coach-card-head">
                    <span>GRADE LOCK</span>
                    <strong data-coach-grade-lock-title></strong>
                  </div>
                  <p data-coach-grade-lock-desc></p>
                  <div class="coach-bank-row">
                    <span data-coach-bank-count></span>
                    <a class="lesson-practice-link coach-bank-link" href="question-bank.html" data-coach-bank-link>
                      <b>进入题库</b>
                    </a>
                  </div>
                </section>

                <section class="coach-card">
                  <div class="coach-card-head">
                    <span>RECORD</span>
                    <strong>学习记录</strong>
                  </div>
                  <div class="coach-signal-grid" data-learner-signals></div>
                  <ul class="coach-advice-list coach-next-list" data-coach-next-steps></ul>
                </section>
              </div>
            </aside>
          </div>
        </section>
      </main>
    </div>

    <script src="assets/app.js?v=20260629-6"></script>
  </body>
</html>
