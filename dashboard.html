<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星途启航 AI 自习室</title>
    <link rel="stylesheet" href="assets/app.css?v=20260629-11" />
</head>
  <body class="profile-ready" data-page="dashboard">
    <div class="ambient">
      <div class="blob one"></div>
      <div class="blob two"></div>
      <div class="blob three"></div>
    </div>

    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div>
            <div class="brand-stack">
              <div class="brand-lockup">
                <span class="brand-kicker">星途</span>
                <span class="brand-title">启航教育</span>
              </div>
            </div>
          </div>
        </div>

        <nav class="nav">
          <a href="/dashboard" class="nav-btn active"><span class="icon-badge">学</span><span class="nav-label">学习中心</span></a>
          <a href="/subjects" class="nav-btn"><span class="icon-badge">课</span><span class="nav-label">全部课程</span></a>
          <a href="/mistakes" class="nav-btn"><span class="icon-badge">错</span><span class="nav-label">智能错题本</span></a>
          <a href="/growth" class="nav-btn"><span class="icon-badge">轨</span><span class="nav-label">成长轨迹</span></a>
        </nav>

        <div class="sidebar-footer">
          <div class="avatar-card avatar-trigger-card" id="avatar-trigger">
            <div>
              <p class="sidebar-user-name" data-user-name></p>
              <p class="muted sidebar-user-level" data-user-level></p>
            </div>
            <div class="avatar" data-avatar-text></div>
            <div class="avatar-dropdown" id="avatar-dropdown">
              <div class="dropdown-header">
                <div class="avatar avatar-sm" data-avatar-text></div>
                <div>
                  <p class="dropdown-user-name" data-user-name></p>
                  <p class="dropdown-user-email" data-user-email></p>
                </div>
              </div>
              <div class="dropdown-divider"></div>
              <a href="/login" data-action="logout" class="dropdown-item dropdown-logout">
                <span class="dropdown-logout-icon">🚪</span> 退出登录
              </a>
            </div>
          </div>
        </div>
      </aside>

      <main class="content">
        <div class="page-scroll">
          <section class="page active" id="dashboard-page">
            <div class="grid dashboard-grid-top">
              <div class="hero-card">
                <div class="hero-body">
                  <div>
                    <div class="hero-pill" id="dashboard-hero-pill"></div>
                    <h1 class="hero-title" id="dashboard-hero-title">学习中心</h1>
                    <p class="hero-desc" id="dashboard-hero-desc">这里只展示当前学生已经购买并由老师开通的课程，以及这些课程产生的学习记录。</p>
                  </div>
                  <a href="/subjects" class="primary-btn">查看全部课程</a>
                </div>
              </div>

              <div class="card achievement">
                <p class="muted achievement-kicker">学习成就</p>
                <div class="achievement-mark"></div>
                <div class="achievement-number" id="dashboard-study-days"></div>
                <p class="achievement-label" id="dashboard-achievement-label"></p>
                <div class="progress-track"><div class="progress-fill progress-fill-zero" id="dashboard-level-progress"></div></div>
                <p class="muted text-sm" id="dashboard-xp-summary"></p>
              </div>
            </div>

            <div class="card mt-24">
              <div class="section-head">
                <h2 class="section-title">我的已购课程</h2>
                <span class="stat-chip stat-chip-primary"></span>
              </div>
              <div class="course-grid" id="dashboard-courses">
                
              </div>
            </div>

            <div class="grid dashboard-grid-main mt-24">
              <div class="grid gap-24">
                <div class="card">
                  <div class="section-head">
                    <h2 class="section-title">智能刷题</h2>
                    <span class="stat-chip stat-chip-emerald"></span>
                  </div>
                  <div class="timeline" id="dashboard-timeline"></div>
                </div>
              </div>

              <div class="grid gap-24">
                <div class="card">
                  <div class="section-head">
                    <h2 class="section-title">智能错题本</h2>
                    <span class="stat-chip stat-chip-orange" id="dashboard-mistake-count"></span>
                  </div>
                  <div class="mistake-box" id="dashboard-mistake"></div>
                </div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script src="assets/app.js?v=20260629-11"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        initDashboardPage().catch((error) => console.warn(error));
      });
    </script>
  </body>
</html>
