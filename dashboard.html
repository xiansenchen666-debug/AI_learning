<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Minds - 知识脉络</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body {
            font-family: 'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #000000;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }
        .apple-tight { letter-spacing: -0.02em; }
        .glass { 
            background: rgba(39, 39, 41, 0.6); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .nav-glass {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Global Nav -->
    <nav class="h-[44px] nav-glass flex items-center justify-between px-6 border-b border-white/10 sticky top-0 z-50">
        <div class="text-[12px] font-semibold tracking-wide text-white">ELITE MINDS</div>
        <div class="flex space-x-6 text-[12px] text-gray-300">
            <a href="/dashboard" class="text-white">概览</a>
            <a href="/ai" class="hover:text-white transition-colors">AI答疑</a>
            <button onclick="window.location.href='/'" class="bg-[#1d1d1f] text-white px-[15px] py-[8px] rounded-[8px] hover:scale-95 transition-transform ml-4">退出</button>
        </div>
    </nav>

    <main class="flex-1 w-full max-w-[980px] mx-auto px-6 py-[80px]">
        <h1 class="text-[40px] font-semibold apple-tight mb-2 text-center md:text-left">知识脉络舱</h1>
        <p class="text-[21px] text-gray-400 mb-12 text-center md:text-left">选择学段与科目，探索无界知识宇宙。</p>

        <!-- Stage selector -->
        <div class="flex space-x-8 mb-8 border-b border-white/10 pb-4 justify-center md:justify-start" id="stage-selector">
            <button class="stage-btn text-[17px] text-white font-semibold transition-colors relative" data-stage="primary">小学
                <div class="absolute -bottom-[17px] left-0 right-0 h-[2px] bg-white hidden stage-indicator"></div>
            </button>
            <button class="stage-btn text-[17px] text-gray-500 hover:text-white transition-colors relative" data-stage="middle">初中
                <div class="absolute -bottom-[17px] left-0 right-0 h-[2px] bg-white hidden stage-indicator"></div>
            </button>
            <button class="stage-btn text-[17px] text-gray-500 hover:text-white transition-colors relative" data-stage="high">高中
                <div class="absolute -bottom-[17px] left-0 right-0 h-[2px] bg-white hidden stage-indicator"></div>
            </button>
        </div>

        <!-- Subject selector (Capsules) -->
        <div class="flex space-x-3 mb-[64px] overflow-x-auto pb-2 justify-center md:justify-start" id="subject-selector">
            <!-- Rendered by JS -->
        </div>

        <!-- Knowledge Graph Area -->
        <div class="relative min-h-[400px]">
            <div class="absolute left-8 top-0 bottom-0 w-px bg-white/10 z-0 hidden md:block"></div>
            <div id="knowledge-nodes" class="space-y-[32px] relative z-10">
                <!-- Nodes rendered by JS -->
            </div>
        </div>
    </main>

    <script>
        const mockData = {
            primary: {
                math: [
                    { id: "pm1", title: "💡 四则运算", sub: "加减乘除与运算律的基础构建" }, 
                    { id: "pm2", title: "📐 几何图形", sub: "认识点、线、面与基础面积周长计算" },
                    { id: "pm3", title: "📊 数据统计", sub: "认识基础条形图与折线图" }
                ],
                english: [
                    { id: "pe1", title: "🍎 字母与音标", sub: "自然拼读与发音基础入门" },
                    { id: "pe2", title: "🗣 日常交际", sub: "基础问候与自我介绍表达" }
                ]
            },
            middle: {
                math: [
                    { id: "mm1", title: "✖️ 代数式与方程", sub: "一元一次方程与不等式的深度解析" }, 
                    { id: "mm2", title: "⭕️ 平面几何", sub: "全等三角形与圆的基础性质" }
                ],
                physics: [
                    { id: "mp1", title: "🚀 力与运动", sub: "牛顿第一定律与摩擦力探究" }, 
                    { id: "mp2", title: "🌈 声光热", sub: "光的反射、折射与热力学初步" }
                ]
            },
            high: {
                math: [
                    { id: "hm1", title: "💡 函数的概念", sub: "定义域与值域的探索，映射关系的本质" }, 
                    { id: "hm2", title: "⚡ 导数的应用", sub: "极值、切线方程与函数单调性分析" },
                    { id: "hm3", title: "🎲 概率与统计", sub: "正态分布与古典概型的进阶应用" }
                ],
                physics: [
                    { id: "hp1", title: "🌌 万有引力", sub: "开普勒定律与天体运动规律" }, 
                    { id: "hp2", title: "🚀 宇宙速度", sub: "第一、二、三宇宙速度的严密推导" },
                    { id: "hp3", title: "🧲 电磁感应", sub: "法拉第电磁感应定律与楞次定律" }
                ],
                chemistry: [
                    { id: "hc1", title: "⚖️ 物质的量", sub: "摩尔与阿伏伽德罗常数的核心计算" }, 
                    { id: "hc2", title: "🧪 氧化还原反应", sub: "电子转移与复杂方程式配平技巧" }
                ]
            }
        };

        const subjectsMap = {
            math: "数学", physics: "物理", chemistry: "化学", english: "英语"
        };

        let currentStage = 'high';
        let currentSubject = 'math';

        function renderSubjects() {
            const container = document.getElementById('subject-selector');
            const subjects = Object.keys(mockData[currentStage]);
            if (!subjects.includes(currentSubject)) currentSubject = subjects[0];
            
            container.innerHTML = subjects.map(sub => `
                <button onclick="setSubject('${sub}')" class="px-[16px] py-[8px] rounded-[9999px] text-[14px] transition-all border ${currentSubject === sub ? 'border-[#0071e3] bg-[#0071e3] text-white shadow-[0_0_15px_rgba(0,102,204,0.4)]' : 'border-white/10 bg-[#272729] text-gray-300 hover:bg-[#2a2a2c]'}">
                    ${subjectsMap[sub] || sub}
                </button>
            `).join('');
            renderNodes();
        }

        function renderNodes() {
            const container = document.getElementById('knowledge-nodes');
            const nodes = mockData[currentStage][currentSubject];
            
            // Apply slight stagger animation
            container.innerHTML = nodes.map((node, index) => `
                <div class="flex flex-col md:flex-row items-center md:items-start cursor-pointer group animate-fade-in" style="animation-delay: ${index * 100}ms" onclick="window.location.href='/course?id=${node.id}'">
                    <div class="w-16 h-16 rounded-full glass flex items-center justify-center shrink-0 border border-white/10 group-hover:border-[#0066cc] group-hover:bg-[#0066cc]/10 transition-all duration-300 z-10 bg-[#1d1d1f] mb-4 md:mb-0">
                        <span class="text-[20px] text-gray-300 group-hover:text-[#0066cc]">${index + 1}</span>
                    </div>
                    <div class="md:ml-8 mt-1 bg-[#272729] p-8 rounded-[18px] w-full max-w-2xl border border-transparent group-hover:border-[#0066cc]/50 transition-all duration-300">
                        <div class="text-[12px] text-gray-400 mb-2 uppercase tracking-widest">Node ${index + 1}</div>
                        <h3 class="text-[28px] font-semibold apple-tight mb-2 group-hover:text-[#2997ff] transition-colors">${node.title}</h3>
                        <p class="text-[17px] text-[#cccccc] leading-[1.47]">${node.sub}</p>
                    </div>
                </div>
            `).join('');
        }

        function setSubject(sub) {
            currentSubject = sub;
            renderSubjects();
        }

        document.querySelectorAll('.stage-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                // Update UI for stage selection
                document.querySelectorAll('.stage-btn').forEach(b => {
                    b.classList.remove('text-white', 'font-semibold');
                    b.classList.add('text-gray-500');
                    b.querySelector('.stage-indicator').classList.add('hidden');
                });
                const target = e.currentTarget;
                target.classList.add('text-white', 'font-semibold');
                target.classList.remove('text-gray-500');
                target.querySelector('.stage-indicator').classList.remove('hidden');
                
                currentStage = target.dataset.stage;
                renderSubjects();
            });
        });

        // Initialize active state line
        document.querySelector('.stage-btn[data-stage="high"]').classList.add('text-white', 'font-semibold');
        document.querySelector('.stage-btn[data-stage="high"] .stage-indicator').classList.remove('hidden');

        // Init
        renderSubjects();
    </script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; opacity: 0; }
    </style>
</body>
</html>
