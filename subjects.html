<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星途启航 AI 自习室</title>
    <link rel="stylesheet" href="assets/app.css?v=20260713-06" />
</head>
  <body class="profile-ready" data-page="subjects">
    <div class="ambient">
      <div class="blob one"></div>
      <div class="blob two"></div>
      <div class="blob three"></div>
    </div>

    <div class="app-shell">
                  <aside class="sidebar">
        <div class="brand">
          <div>
            <div class="brand-stack">
            <div class="brand-lockup">
  <span class="brand-kicker">星途</span>
  <span class="brand-title">启航教育</span>
</div>
          </div>
            
          </div>
        </div>

        <nav class="nav">
          <a href="/dashboard" class="nav-btn"><span class="icon-badge">学</span><span class="nav-label">学习中心</span></a>
          <a href="/subjects" class="nav-btn active"><span class="icon-badge">课</span><span class="nav-label">全部课程</span></a>
          <a href="/mistakes" class="nav-btn"><span class="icon-badge">错</span><span class="nav-label">智能错题本</span></a>
          <a href="/growth" class="nav-btn"><span class="icon-badge">轨</span><span class="nav-label">成长轨迹</span></a>
          <a href="/question-bank" class="nav-btn question-bank-nav"><span class="icon-badge">题</span><span class="nav-label">题库练习</span></a>
        </nav>

        <div class="sidebar-footer">
          <div class="avatar-card avatar-trigger-card" id="avatar-trigger">
            <div>
              <p class="sidebar-user-name" data-user-name></p>
              <p class="muted sidebar-user-level" data-user-level></p>
            </div>
            <div class="avatar" data-avatar-text></div>
            <div class="avatar-dropdown" id="avatar-dropdown">
              <div class="dropdown-header">
                <div class="avatar avatar-sm" data-avatar-text></div>
                <div>
                  <p class="dropdown-user-name" data-user-name></p>
                  <p class="dropdown-user-email" data-user-email></p>
                </div>
              </div>
              <div class="dropdown-divider"></div>
              <a href="/login" data-action="logout" class="dropdown-item dropdown-logout">
                <span class="dropdown-logout-icon">🚪</span> 退出登录
              </a>
            </div>
          </div>
        </div>
      </aside>

      <main class="content">
<div class="page-scroll">
          <section class="page active" id="subjects-page">
            <div class="growth-header"><div><h1 class="section-title page-title-lg">全部课程</h1></div></div>
            <div id="subjects-root" class="is-hidden">
              <section class="subjects-hero-card">
                <div class="subjects-hero-copy">
                  <p class="subjects-hero-kicker">XINGTU GLOBAL CURRICULUM</p>
                  <h2 class="subjects-hero-title">先选年级，再选科目</h2>
                  <p class="subjects-hero-desc">课程入口按真实学习路径组织。先进入年级页面，再查看这个年级下的科目和课本，已开通课本可直接进入课程学习。</p>
                </div>
                <div class="subjects-hero-stats">
                  <div class="subjects-hero-stat"><strong data-subject-total-stages></strong><span>学习阶段</span></div>
                  <div class="subjects-hero-stat"><strong data-subject-total-subjects></strong><span>学科总数</span></div>
                  <div class="subjects-hero-stat"><strong data-subject-purchased-total></strong><span>已开通课本</span></div>
                </div>
              </section>

              <section class="grade-entry-shell">
                <div class="stage-panel-head">
                  <div>
                    <p class="stage-eyebrow">GRADE FIRST</p>
                    <h2 class="section-title">选择年级</h2>
                  </div>
                  <span class="stage-panel-meta" data-grade-total-summary></span>
                </div>
                <div class="grade-entry-grid" data-grade-grid></div>
              </section>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script src="assets/app.js?v=20260713-06"></script>
  </body>
</html>
