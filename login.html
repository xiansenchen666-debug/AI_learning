<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - 星途启航 AI 自习室</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body class="login-page">
    <main class="login-stage">
      <section class="login-showcase">
        <div style="max-width: 420px; text-align: left;">
          <div style="font-size: 30px; margin-bottom: 24px;">✨</div>
          <h1 class="login-headline">点亮你的星途。</h1>
          <p class="login-copy">
            每一次解题，都是对未知的跨越。
            <br />
            在这里，AI 与你并肩，把复杂的知识化作清晰的轨迹。
            <br />
            <br />
            保持专注，保持好奇。
          </p>
        </div>
      </section>

      <section class="login-container">
        <div class="login-card-header">
          <h2 class="login-card-title">学生登录</h2>
          <p class="login-card-subtitle">登录后继续你的个人学习空间</p>
        </div>

        <form action="/api/login" method="POST">
          <div class="form-group">
            <label class="form-label" for="username">学生账号</label>
            <input
              id="username"
              type="text"
              name="username"
              class="form-input"
              placeholder="请输入学校或机构分配的账号"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">密码</label>
            <input
              id="password"
              type="password"
              name="password"
              class="form-input"
              placeholder="请输入密码"
              required
            />
          </div>

          <button type="submit" class="submit-btn">登录系统</button>
        </form>

        <div class="notice">
          <p>
            <strong>提示</strong><br />
            系统账号由学校或培训机构统一分配，不支持学生自行注册。<br />
            如需获取账号或密码遗失，请联系带班老师。
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
