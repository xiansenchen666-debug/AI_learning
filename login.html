<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Minds - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body {
            font-family: 'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #000000;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }
        .apple-tight { letter-spacing: -0.02em; }
        .action-blue { background-color: #0066cc; }
        .action-blue-text { color: #0066cc; }
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative overflow-hidden">
    <!-- Atmospheric background mimicking Apple's environment pages -->
    <div class="absolute inset-0 z-0">
        <div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-[800px] h-[800px] bg-[#0066cc]/10 rounded-full blur-[120px] pointer-events-none"></div>
    </div>
    
    <div class="z-10 text-center w-full max-w-md px-6">
        <p class="text-[12px] tracking-widest text-gray-400 uppercase mb-4 font-semibold">DESIGNED BY ELITE MINDS</p>
        <h1 class="text-[40px] md:text-[56px] font-semibold apple-tight mb-4 text-white leading-[1.07]">由清华等名校名师团队<br>联合打造。</h1>
        <p class="text-[21px] text-gray-400 mb-12 font-medium">汇聚全球卓越教育资源，智启未来学习新时代。</p>
        
        <div class="glass rounded-[18px] p-10 text-left relative z-20">
            <h2 class="text-[24px] font-semibold mb-6 apple-tight">登录学习空间</h2>
            <div class="space-y-4">
                <input type="text" placeholder="Apple ID 或手机号" class="w-full bg-transparent border border-white/20 rounded-[8px] px-4 py-3 text-[17px] text-white focus:outline-none focus:border-[#0071e3] transition-colors">
                <input type="password" placeholder="密码" class="w-full bg-transparent border border-white/20 rounded-[8px] px-4 py-3 text-[17px] text-white focus:outline-none focus:border-[#0071e3] transition-colors">
            </div>
            <button onclick="window.location.href='/dashboard'" class="w-full action-blue text-white rounded-[9999px] py-[11px] mt-8 text-[17px] font-medium transition-transform active:scale-95">
                登录
            </button>
            <div class="text-center mt-6">
                <a href="#" class="action-blue-text text-[14px] hover:underline">忘记密码或 Apple ID？</a>
            </div>
        </div>
    </div>
</body>
</html>
