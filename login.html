<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - 星途启航 AI 自习室</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body class="login-page">
    <div class="ambient">
      <div class="blob one"></div>
      <div class="blob two"></div>
      <div class="blob three"></div>
    </div>

    
    <div style="position: absolute; top: 32px; left: 40px; display: flex; align-items: center; gap: 12px; z-index: 10;">
      <div class="brand-mark" style="width: 32px; height: 32px; font-size: 16px;">星</div>
      <div style="font-weight: 800; font-size: 18px; color: var(--text); letter-spacing: 1px;">星途启航教育</div>
    </div>

    <main class="login-stage">
      <section class="login-showcase">
          <div class="login-brand-area" style="max-width:400px;text-align:left;">
            <div style="font-size:32px;margin-bottom:24px;">✨</div>
            <h1 class="login-headline" style="font-size:40px;line-height:1.2;margin-bottom:16px;">
              点亮你的星途。
            </h1>
            <p class="login-copy" style="font-size:17px;line-height:1.6;color:var(--muted);font-weight:400;">
              每一次解题，都是对未知的跨越。<br>
              在这里，AI 与你并肩，将复杂的知识化作清晰的轨迹。<br><br>
              保持专注，保持好奇。
            </p>
          </div>
        </section>

      <section class="login-container">
        <div class="login-card-header">
          <h2 class="login-card-title">学生登录</h2>
          <p class="login-card-subtitle">登录后继续你的个人学习空间</p>
        </div>

        
        <form action="/api/login" method="POST" id="login-form">
          <script>
            const params = new URLSearchParams(window.location.search);
            if (params.get('error') === '1') {
              document.write('<div style="color: var(--orange); font-size: 14px; margin-bottom: 16px; background: rgba(217, 119, 6, 0.1); padding: 12px; border-radius: 8px;">账号或密码不匹配，请联系老师。<br>(测试账号: Cary / 123456)</div>');
            }
          </script>

          <div class="form-group">
            <label class="form-label">学生账号</label>
            <input type="text" name="username" class="form-input" placeholder="请输入学校/机构分配的账号" required />
          </div>
          <div class="form-group">
            <label class="form-label">密码</label>
            <input type="password" name="password" class="form-input" placeholder="请输入密码" required />
          </div>
          <button type="submit" class="submit-btn">登录系统</button>
        </form>

        <div class="notice">
          <p><strong>提示</strong><br />系统账号由学校或培训机构统一分配，不支持学生自行注册。<br />如需获取账号或密码遗失，请联系您的带班老师。</p>
        </div>
      </section>
    </main>
  </body>
</html>
