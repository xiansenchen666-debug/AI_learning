<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - 星途启航 AI 自习室</title>
    <link rel="stylesheet" href="assets/app.css?v=20260629-8" />
</head>
  <body class="login-page" data-page="login">
    <div class="ambient">
      <div class="blob one"></div>
      <div class="blob two"></div>
      <div class="blob three"></div>
    </div>

    
    <div class="login-top-brand">
      <div class="brand-lockup">
  <span class="brand-kicker">星途</span>
  <span class="brand-title">启航教育</span>
</div>
    </div>

    <main class="login-stage">
        <section class="login-showcase">
          <div class="login-brand-area">
            <div class="sparkle-icon">✨</div>
            <h1 class="login-headline slide-up-1">
              点亮你的星途<span class="text-accent">.</span>
            </h1>
            <p class="login-copy slide-up-2">
              每一次解题，都是对未知的跨越。<br>
              在这里，AI 与你并肩，将复杂的知识化作清晰的轨迹。<br><br>
              <span class="login-copy-emphasis">保持专注，保持好奇。</span>
            </p>

            <div class="premium-tsinghua-card slide-up-3">
              <div class="premium-watermark">🏛️</div>
              
              <div class="premium-card-content">
                <div class="premium-icon-box">
                  <span class="premium-icon">🎓</span>
                </div>
                <div>
                  <div class="premium-label">Academic Excellence</div>
                  <h2 class="premium-title">
                    <span class="premium-title-accent">联合清华</span>等顶尖名师团队倾力打造
                  </h2>
                  <p class="premium-desc">
                    深度拆解核心考点，重塑底层逻辑，构建国际化标准的高效学习链路。
                  </p>
                </div>
              </div>
            </div>
          </div>
        </section>

      <section class="login-container">
        <div class="login-card-header">
          <h2 class="login-card-title">账号登录</h2>
          <p class="login-card-subtitle">学生进入学习中心，老师进入课程管理</p>
        </div>

        
        <form action="/api/login" method="POST" id="login-form">
          <script>
            const params = new URLSearchParams(window.location.search);
            if (params.get('error') === '1') {
              document.write('<div class="slide-up-1 login-error-message">账号或密码不匹配，请联系老师。</div>');
            }
          </script>

          <div class="form-group slide-up-3">
            <label class="form-label">账号</label>
            <input id="login-username" type="text" name="username" class="form-input" placeholder="请输入学校/机构分配的账号" required />
          </div>
          <div class="form-group slide-up-4">
            <label class="form-label">密码</label>
            <input id="login-password" type="password" name="password" class="form-input" placeholder="请输入密码" required />
          </div>
          <div class="slide-up-5">
            <button type="submit" class="submit-btn">登录系统</button>
          </div>
        </form>

        <div class="notice">
          <p><strong>提示</strong><br />系统账号由学校或培训机构统一分配，不支持学生自行注册。<br />如需获取账号或密码遗失，请联系您的带班老师。</p>
        </div>
      </section>
    </main>
    <script src="assets/app.js?v=20260629-8"></script>
  </body>
</html>
