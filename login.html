<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - 星途启航 AI 自习室</title>
    <style>
      :root {
        --bg: #e8eef2;
        --text: #1e293b;
        --muted: #64748b;
        --primary: #4f46e5;
        --primary-hover: #4338ca;
        --radius-2xl: 32px;
        --shadow-strong: 0 18px 48px rgba(30, 41, 59, 0.12);
        --transition: 220ms ease;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        min-height: 100vh;
        font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      button, input { font: inherit; }

      .ambient { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
      .blob { position: absolute; border-radius: 50%; filter: blur(90px); opacity: .75; animation: drift 18s ease-in-out infinite; }
      .blob.one { top: -12%; left: -10%; width: 44rem; height: 44rem; background: rgba(99, 102, 241, .22); }
      .blob.two { top: 16%; right: -12%; width: 40rem; height: 40rem; background: rgba(168, 85, 247, .2); animation-delay: -4s; }
      .blob.three { bottom: -20%; left: 18%; width: 46rem; height: 46rem; background: rgba(59, 130, 246, .18); animation-delay: -8s; }
      @keyframes drift {
        0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
        50% { transform: translate3d(24px, -18px, 0) scale(1.08); }
      }

      .login-container {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 440px;
        padding: 48px 40px;
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: var(--radius-2xl);
        box-shadow: var(--shadow-strong);
      }

      .brand { text-align: center; margin-bottom: 32px; }
      .brand-mark {
        width: 64px; height: 64px; border-radius: 22px; color: #fff; font-size: 28px; font-weight: 700;
        background: linear-gradient(135deg, #6366f1, #2563eb); box-shadow: 0 14px 24px rgba(99,102,241,.24);
        display: inline-flex; align-items: center; justify-content: center; margin-bottom: 16px;
      }
      .brand-title { margin: 0; font-size: 26px; font-weight: 800; }
      .brand-subtitle { margin: 8px 0 0; color: var(--primary); font-size: 14px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; }

      .form-group { margin-bottom: 20px; }
      .form-label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
      .form-input {
        width: 100%; padding: 14px 18px; border: 1px solid rgba(0, 0, 0, 0.1); border-radius: 16px;
        background: rgba(255, 255, 255, 0.9); outline: none; transition: all var(--transition);
        font-size: 15px;
      }
      .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
      
      .submit-btn {
        width: 100%; padding: 16px; border: none; border-radius: 16px; font-size: 16px; font-weight: 800;
        color: #fff; background: var(--primary); cursor: pointer; transition: all var(--transition);
        margin-top: 12px; box-shadow: 0 8px 20px rgba(79, 70, 229, 0.25);
      }
      .submit-btn:hover { background: var(--primary-hover); transform: translateY(-1px); }

      .notice {
        margin-top: 24px; padding: 16px; border-radius: 16px; background: rgba(241, 245, 249, 0.8);
        border: 1px solid rgba(226, 232, 240, 0.8); text-align: center;
      }
      .notice p { margin: 0; font-size: 13px; color: var(--muted); line-height: 1.6; }
      .notice p strong { color: var(--text); }
    </style>
  </head>
  <body>
    <div class="ambient">
      <div class="blob one"></div>
      <div class="blob two"></div>
      <div class="blob three"></div>
    </div>

    <div class="login-container">
      <div class="brand">
        <div class="brand-mark">星</div>
        <h1 class="brand-title">星途启航</h1>
        <p class="brand-subtitle">AI 自习室</p>
      </div>

      <form action="/dashboard" method="GET" id="login-form">
        <div class="form-group">
          <label class="form-label">学生账号</label>
          <input type="text" class="form-input" placeholder="请输入学校/机构分配的账号" required />
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" class="form-input" placeholder="请输入密码" required />
        </div>
        <button type="submit" class="submit-btn">登录系统</button>
      </form>

      <div class="notice">
        <p><strong>⚠️ 注意事项</strong><br/>系统账号由学校或培训机构统一分配，不支持学生自行注册。<br/>如需获取账号或密码遗失，请联系您的带班老师。</p>
      </div>
    </div>
    
    <script>
      document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        // Simulate login success and redirect
        window.location.href = '/dashboard';
      });
    </script>
  </body>
</html>
