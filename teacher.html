<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>老师管理 - 星途启航 AI 自习室</title>
    <link rel="stylesheet" href="assets/app.css?v=20260713-01" />
</head>
  <body class="profile-ready" data-page="teacher">
    <div class="ambient">
      <div class="blob one"></div>
      <div class="blob two"></div>
      <div class="blob three"></div>
    </div>

    <div class="app-shell">
                  <aside class="sidebar">
        <div class="brand">
          <div>
            <div class="brand-stack">
            <div class="brand-lockup">
  <span class="brand-kicker">星途</span>
  <span class="brand-title">启航教育</span>
</div>
          </div>
            
          </div>
        </div>

        <nav class="nav">
          <a href="/teacher" class="nav-btn active"><span class="icon-badge">管</span><span class="nav-label">老师管理</span></a>
        </nav>

        <div class="sidebar-footer">
          <div class="avatar-card avatar-trigger-card" id="avatar-trigger">
            <div>
              <p class="sidebar-user-name" data-user-name></p>
              <p class="muted sidebar-user-level" data-user-level></p>
            </div>
            <div class="avatar" data-avatar-text></div>
            <div class="avatar-dropdown" id="avatar-dropdown">
              <div class="dropdown-header">
                <div class="avatar avatar-sm" data-avatar-text></div>
                <div>
                  <p class="dropdown-user-name" data-user-name></p>
                  <p class="dropdown-user-email" data-user-email></p>
                </div>
              </div>
              <div class="dropdown-divider"></div>
              <a href="/login" data-action="logout" class="dropdown-item dropdown-logout">
                <span class="dropdown-logout-icon">🚪</span> 退出登录
              </a>
            </div>
          </div>
        </div>
      </aside>

      <main class="content">
<div class="page-scroll">
          <section class="page active" id="teacher-page">
            <div class="growth-header"><div><h1 class="section-title page-title-lg">老师管理</h1></div></div>
            <section class="card mt-24" data-admin-only>
              <div class="section-head">
                <h2 class="section-title">创建学生账号</h2>
              </div>
              <form id="student-create-form" class="student-create-form">
                <label class="form-group form-group-compact">
                  <span class="form-label">账号</span>
                  <input class="form-input" name="username" autocomplete="off" required />
                </label>
                <div class="form-group form-group-compact">
                  <span class="form-label">密码</span>
                  <div class="password-field">
                    <input class="form-input" name="password" type="password" autocomplete="new-password" required />
                    <button class="password-toggle" type="button" data-toggle-password aria-label="显示密码">
                      <span aria-hidden="true">👁</span>
                    </button>
                  </div>
                </div>
                <label class="form-group form-group-compact">
                  <span class="form-label">姓名</span>
                  <input class="form-input" name="full_name" autocomplete="off" required />
                </label>
                <label class="form-group form-group-compact">
                  <span class="form-label">阶段</span>
                  <select class="form-input" name="stage">
                    <option value="小学">小学</option>
                    <option value="初中">初中</option>
                    <option value="高中">高中</option>
                    <option value="所有阶段">所有阶段</option>
                  </select>
                </label>
                <label class="form-group form-group-compact">
                  <span class="form-label">年级</span>
                  <input class="form-input" name="grade" autocomplete="off" />
                </label>
                <label class="form-group form-group-compact">
                  <span class="form-label">邮箱</span>
                  <input class="form-input" name="email" type="email" autocomplete="off" />
                </label>
                <label class="form-group form-group-compact">
                  <span class="form-label">可使用天数</span>
                  <input class="form-input" name="access_duration_days" type="number" min="1" max="36500" step="1" placeholder="留空表示长期有效" />
                  <span class="form-help">从创建当天开始按自然日计算，当天算第 1 天；留空表示长期有效。</span>
                </label>
                <div class="student-create-actions">
                  <button class="primary-btn" type="submit" data-create-student>创建学生</button>
                  <span class="muted text-sm" id="student-create-status"></span>
                </div>
              </form>
            </section>
            <section class="card mt-24" data-admin-only>
              <div class="section-head"><div><h2 class="section-title">创建教师账号</h2><p class="muted text-sm">超级管理员可以创建并管理教师账号。</p></div></div>
              <form id="teacher-create-form" class="student-create-form">
                <label class="form-group form-group-compact"><span class="form-label">账号</span><input class="form-input" name="username" required /></label>
                <label class="form-group form-group-compact"><span class="form-label">密码</span><input class="form-input" name="password" type="password" required /></label>
                <label class="form-group form-group-compact"><span class="form-label">姓名</span><input class="form-input" name="full_name" required /></label>
                <label class="form-group form-group-compact"><span class="form-label">邮箱</span><input class="form-input" name="email" type="email" /></label>
                <div class="student-create-actions"><button class="primary-btn" type="submit">创建教师</button><span class="muted text-sm" id="teacher-create-status"></span></div>
              </form>
            </section>
            <section class="card mt-24 model-settings-panel" data-model-settings-panel>
              <div class="section-head">
                <div>
                  <h2 class="section-title">AI 模型配置</h2>
                  <p class="muted text-sm">配置课后记录与成长轨迹自动分析使用的大模型服务。</p>
                </div>
                <span class="save-feedback" data-model-settings-state aria-live="polite">正在读取配置...</span>
              </div>
              <form id="model-settings-form" class="student-create-form model-settings-form" data-model-settings-form>
                <label class="form-group form-group-compact">
                  <span class="form-label">接口 URL</span>
                  <input
                    class="form-input"
                    name="base_url"
                    type="url"
                    inputmode="url"
                    autocomplete="url"
                    placeholder="https://example.com"
                    required
                  />
                </label>
                <div class="form-group form-group-compact">
                  <span class="form-label">API Key</span>
                  <div class="password-field">
                    <input
                      class="form-input"
                      name="api_key"
                      type="password"
                      autocomplete="new-password"
                      placeholder="留空表示保留当前 API Key"
                    />
                    <button class="password-toggle" type="button" data-toggle-password aria-label="显示 API Key">
                      <span aria-hidden="true">👁</span>
                    </button>
                  </div>
                  <span class="form-help">出于安全考虑，已保存的 API Key 不会在此显示。</span>
                </div>
                <label class="form-group form-group-compact">
                  <span class="form-label">模型</span>
                  <input
                    class="form-input"
                    name="model"
                    autocomplete="off"
                    placeholder="例如：gpt-5.4"
                    required
                  />
                </label>
                <div class="student-create-actions model-settings-actions">
                  <button class="secondary-btn" type="button" data-test-model-settings>测试连接</button>
                  <button class="primary-btn" type="submit" data-save-model-settings>保存配置</button>
                  <span class="save-feedback" data-model-settings-status aria-live="polite"></span>
                </div>
              </form>
            </section>
            <section class="card teacher-admin-panel is-hidden" id="teacher-admin-panel">
              <div class="section-head">
                <h2 class="section-title">学生购课管理</h2>
              </div>
              <div id="teacher-admin-root"></div>
            </section>
            <section class="card mt-24 teacher-record-panel is-hidden" id="teacher-record-panel">
              <div class="section-head"><div><h2 class="section-title">课后辅导记录</h2><p class="muted text-sm">提交后系统会自动分析学生做得好的地方和下一步改进方向。</p></div></div>
              <div id="teacher-record-root"></div>
            </section>
          </section>
        </div>
      </main>
    </div>

    
    <script>
      // Dropdown toggle logic
      const avatarTrigger = document.getElementById('avatar-trigger');
      const avatarDropdown = document.getElementById('avatar-dropdown');
      
      if (avatarTrigger && avatarDropdown) {
        avatarTrigger.addEventListener('click', function(e) {
          e.stopPropagation();
          avatarDropdown.classList.toggle('active');
        });
        
        document.addEventListener('click', function(e) {
          if (!avatarTrigger.contains(e.target)) {
            avatarDropdown.classList.remove('active');
          }
        });
      }
    </script>
    <script src="assets/app.js?v=20260713-02"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        initTeacherPage().catch((error) => console.warn(error));
      });
    </script>
  </body>
</html>
