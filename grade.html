<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星途启航 AI 自习室</title>
    <link rel="stylesheet" href="assets/app.css?v=20260701-08" />
  </head>
  <body class="profile-ready" data-page="grade">
    <div class="ambient">
      <div class="blob one"></div>
      <div class="blob two"></div>
      <div class="blob three"></div>
    </div>

    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div>
            <div class="brand-stack">
              <div class="brand-lockup">
                <span class="brand-kicker">星途</span>
                <span class="brand-title">启航教育</span>
              </div>
            </div>
          </div>
        </div>

        <nav class="nav">
          <a href="/dashboard" class="nav-btn"><span class="icon-badge">学</span><span class="nav-label">学习中心</span></a>
          <a href="/subjects" class="nav-btn active"><span class="icon-badge">课</span><span class="nav-label">全部课程</span></a>
          <a href="/mistakes" class="nav-btn"><span class="icon-badge">错</span><span class="nav-label">智能错题本</span></a>
          <a href="/growth" class="nav-btn"><span class="icon-badge">轨</span><span class="nav-label">成长轨迹</span></a>
        </nav>

        <div class="sidebar-footer">
          <div class="avatar-card avatar-trigger-card" id="avatar-trigger">
            <div>
              <p class="sidebar-user-name" data-user-name></p>
              <p class="muted sidebar-user-level" data-user-level></p>
            </div>
            <div class="avatar" data-avatar-text></div>
            <div class="avatar-dropdown" id="avatar-dropdown">
              <div class="dropdown-header">
                <div class="avatar avatar-sm" data-avatar-text></div>
                <div>
                  <p class="dropdown-user-name" data-user-name></p>
                  <p class="dropdown-user-email" data-user-email></p>
                </div>
              </div>
              <div class="dropdown-divider"></div>
              <a href="/login" data-action="logout" class="dropdown-item dropdown-logout">
                <span class="dropdown-logout-icon">🚪</span> 退出登录
              </a>
            </div>
          </div>
        </div>
      </aside>

      <main class="content course-content-shell">
        <section class="course-workspace page active">
          <header class="workspace-mini-header">
            <div class="workspace-title-zone">
              <a href="/subjects" class="nav-back-link workspace-back-link" data-subject-overview-link>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                <span>返回年级</span>
              </a>
              <div class="workspace-title-copy">
                <h1 id="grade-title-main"></h1>
                <p id="grade-title-subtitle"></p>
              </div>
            </div>
            <div id="grade-summary" class="workspace-badges"></div>
          </header>

          <div id="grade-root" class="grade-page-root is-hidden">
            <div class="subject-board grade-subject-board" data-grade-subject-board></div>
          </div>
        </section>
      </main>
    </div>

    <script src="assets/app.js?v=20260701-08"></script>
  </body>
</html>
